<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Energy Performance Visualization</title>

<style>
:root{
  --bg:#f5f7f6;
  --card:#ffffff;
  --muted:#6b7280;

  /* ESRT-inspired palette */
  --esrt-green:#00594c;
  --esrt-blue:#007fa3;

  --success:#1f8a4c;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:40px;
}

.container{
  width:980px;
  max-width:100%;
  background:#fff;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  padding:40px;
  display:flex;
  gap:60px;
  align-items:center;
  flex-wrap:wrap;
}

/* LEFT VISUAL */
.visual{
  width:300px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.bulb-label{
  font-size:22px;
  font-weight:700;
  color:var(--esrt-green);
}

.bulb-caption{
  font-size:14px;
  color:var(--muted);
  text-align:center;
  max-width:260px;
}

/* RIGHT INFO */
.info{
  flex:1;
  min-width:280px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.title{
  font-size:20px;
  font-weight:600;
  color:var(--esrt-green);
}

.subtitle{
  font-size:14px;
  color:var(--muted);
}

.stats{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
}

.stat{
  min-width:220px;
}

.big{
  font-size:32px;
  font-weight:700;
  color:var(--esrt-green);
}

.small{
  font-size:14px;
  color:var(--muted);
}

.offset{
  margin-top:10px;
  font-size:16px;
  font-weight:600;
  color:var(--success);
}

/* Smooth transitions */
.bulb-core,
.bulb-glow{
  transition: all 900ms cubic-bezier(.2,.9,.3,1);
}

@media (max-width:820px){
  .container{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT: LIGHTBULB -->
  <div class="visual">

    <svg id="lightSvg" viewBox="0 0 220 320" width="200" height="280">

      <defs>
        <radialGradient id="bulbGlassGrad" cx="50%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#fffdf8"/>
          <stop offset="70%" stop-color="#f3efe8"/>
          <stop offset="100%" stop-color="#e8e3da"/>
        </radialGradient>

        <radialGradient id="lightGlowGrad" cx="50%" cy="45%" r="65%">
          <stop offset="0%" stop-color="#ffe7a6"/>
          <stop offset="60%" stop-color="#ffd46a"/>
          <stop offset="100%" stop-color="rgba(255,212,106,0)"/>
        </radialGradient>

        <linearGradient id="metalGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#d9dde0"/>
          <stop offset="100%" stop-color="#b6bcc0"/>
        </linearGradient>
      </defs>

      <!-- Glow -->
      <g id="glowGroup" class="bulb-glow" transform="translate(110,100)">
        <circle cx="0" cy="0" r="80" fill="url(#lightGlowGrad)" opacity="1"/>
      </g>

      <!-- Bulb -->
      <g id="coreGroup" class="bulb-core">

        <!-- Glass -->
        <path d="
          M110 40
          C150 40, 175 75, 175 115
          C175 150, 150 185, 135 205
          C125 218, 122 225, 122 235
          L98 235
          C98 225, 95 218, 85 205
          C70 185, 45 150, 45 115
          C45 75, 70 40, 110 40
          Z"
          fill="url(#bulbGlassGrad)"
          stroke="rgba(0,0,0,0.08)"
          stroke-width="2"/>

        <!-- Inner Light -->
        <ellipse id="lightCore"

                 cx="110"

                 cy="120"

                 rx="46"

                 ry="38"

                 fill="rgba(255,220,120,0.9)"/>
 

        <!-- Highlight -->
       

        <!-- Neck -->
        <rect x="92" y="235" width="36" height="22"
              fill="#e8ecef"
              stroke="rgba(0,0,0,0.05)"
              stroke-width="1"/>

        <!-- Screw base -->
        <rect x="86" y="257" width="48" height="55"
              rx="6"
              fill="url(#metalGrad)"
              stroke="rgba(0,0,0,0.08)"
              stroke-width="1"/>

        <!-- Screw ridges -->
        <g stroke="rgba(0,0,0,0.12)" stroke-width="2">
          <line x1="86" y1="270" x2="134" y2="270"/>
          <line x1="86" y1="285" x2="134" y2="285"/>
          <line x1="86" y1="300" x2="134" y2="300"/>
        </g>

      </g>

    </svg>

    <div class="bulb-label" id="bulbPercent">-9.60%</div>
    <div class="bulb-caption">
      decrease in energy consumption compared to 2023
    </div>

  </div>

  <!-- RIGHT: INFO -->
  <div class="info">

    <div>
      <div class="title">Energy Performance — 2024</div>
      <div class="subtitle">
        Portfolio electricity reduction and renewable energy offsets
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="big"><span id="percentValue">0.00</span>%</div>
        <div class="small">
          Decrease in energy consumption compared to 2023
        </div>
      </div>

      <div class="stat">
        <div class="big">100%</div>
        <div class="small">
          of office & multifamily portfolio electricity offset through
          <strong>Green-e Certified Wind Power RECs</strong>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
const percentDecrease = 9.6;

const percentEl = document.getElementById("percentValue");
const bulbLabel = document.getElementById("bulbPercent");
const glow = document.getElementById("glowGroup");
const core = document.getElementById("coreGroup");
const lightCore = document.getElementById("lightCore");

function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

function animateNumber(el,end,dec){
  const start = performance.now();
  function step(now){
    const t = Math.min((now-start)/1400,1);
    el.textContent = (end*easeOut(t)).toFixed(dec);
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function setBrightness(level){
  core.style.filter = `brightness(${level})`;
  glow.style.opacity = level;
  lightCore.style.opacity = level;
}

function run(){
  animateNumber(percentEl,percentDecrease,2);

  const start = performance.now();
  function dim(now){
    const t = Math.min((now-start)/1400,1);
    const eased = easeOut(t);
    const brightness = 1 - (percentDecrease/100)*eased;
    setBrightness(brightness);
    bulbLabel.textContent = `-${(percentDecrease*eased).toFixed(2)}%`;
    if(t<1) requestAnimationFrame(dim);
  }
  requestAnimationFrame(dim);
}

setTimeout(run,200);
</script>

</body>
</html>
